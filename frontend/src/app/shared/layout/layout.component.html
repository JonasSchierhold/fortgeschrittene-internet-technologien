<mat-toolbar color="primary">
  @if (authService.isLoggedIn()) {
    <button mat-icon-button (click)="toggleSidenav()">
      <mat-icon>menu</mat-icon>
    </button>
  }
  <span>FAP Tracker</span>
  <span class="spacer"></span>
  @if (authService.isLoggedIn()) {
    <span class="username">{{ authService.loginName() }}</span>
    <button mat-icon-button (click)="logout()" matTooltip="Abmelden">
      <mat-icon>logout</mat-icon>
    </button>
  }
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  @if (authService.isLoggedIn()) {
    <mat-sidenav [opened]="sidenavOpened" mode="side" class="sidenav">
      <mat-nav-list>
        <a mat-list-item routerLink="/location" routerLinkActive="active">
          <mat-icon matListItemIcon>location_on</mat-icon>
          <span matListItemTitle>Standort</span>
        </a>
        <a mat-list-item routerLink="/monitoring" routerLinkActive="active">
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle>Überwachung</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>
  }

  <mat-sidenav-content>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
